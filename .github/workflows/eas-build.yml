name: EAS Build

# Triggers an EAS (Expo Application Services) iOS build on every push to main.
# Produces a .ipa via the "preview" profile (ad-hoc distribution) that can be
# installed on registered test devices without going through the App Store.
#
# Required GitHub secrets:
#   EXPO_TOKEN — create at https://expo.dev/accounts/[username]/settings/access-tokens
#
# EAS build profiles are defined in apps/mobile/eas.json:
#   development — dev client build for local testing (expo run:ios)
#   preview     — ad-hoc .ipa for internal distribution / TestFlight
#   production  — App Store submission build
#
# To also submit to TestFlight automatically, add the `submit` step with
# APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and ASC_APP_ID secrets.

on:
  push:
    branches: [main]
    # Only rebuild when mobile sources actually change — avoids wasting EAS minutes
    paths:
      - apps/mobile/**
      - packages/**
      - pnpm-lock.yaml

concurrency:
  # Only one EAS build at a time per branch
  group: eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: iOS Preview Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (preview)
        working-directory: apps/mobile
        run: eas build --platform ios --profile preview --non-interactive

      # Uncomment to auto-submit to TestFlight after a successful build:
      # - name: Submit to TestFlight
      #   working-directory: apps/mobile
      #   run: eas submit --platform ios --latest --non-interactive
      #   env:
      #     EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
      #     EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #     EXPO_ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
