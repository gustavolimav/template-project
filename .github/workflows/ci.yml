name: CI

# Runs on every PR and on pushes to main.
# Checks: lint → type-check → unit tests → migration validation
#
# Required secrets: none (all checks are local)
# Required env vars: none (tests use mocks; no real Supabase needed)
#
# Uses corepack to install pnpm — reads the exact version from the
# `packageManager` field in root package.json, avoiding version conflicts.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Cancel in-flight runs for the same branch/PR to save minutes
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (installs pnpm from packageManager field)
        run: corepack enable && corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

  migration-check:
    name: Supabase Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase db start spins up Postgres in Docker, applies all migrations in
      # supabase/migrations/ in filename order, and runs seed.sql.
      # If any migration fails, this step fails and the PR is blocked.
      - name: Apply migrations
        run: supabase db start

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
